name: VSS Daily Update & Sync to HF

on:
  # 1. Chạy tự động lúc 5h chiều (10:00 UTC) từ T2 đến T6
  schedule:
    - cron: '0 10 * * 1-5'
  
  # 2. Cho phép bấm chạy bằng tay trên web
  workflow_dispatch: 
  
  # 3. MỚI: Tự động chạy mỗi khi bạn code xong và bấm Sync (push) từ VS Code lên nhánh main
  push:
    branches: [ main ]

jobs:
  update-and-sync:
    runs-on: self-hosted
    
    # THÊM ĐOẠN NÀY VÀO ĐÂY
    env:
      PYTHONUTF8: 1
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Quan trọng để lấy toàn bộ lịch sử codee

      - name: Cài đặt thư viện
        run: |
          C:/Users/NK/AppData/Local/Microsoft/WindowsApps/python3.12.exe -m pip install --upgrade pip
          C:/Users/NK/AppData/Local/Microsoft/WindowsApps/python3.12.exe -m pip install pandas pyarrow requests

      - name: Chạy Script Daily Updater (Lấy dữ liệu chứng khoán mới)
        run: C:/Users/NK/AppData/Local/Microsoft/WindowsApps/python3.12.exe daily_updater.py

      - name: Lưu file Parquet mới vào GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/processed/*.parquet
          git commit -m "Auto-update market data [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Đồng bộ sang Hugging Face Space
        env:
          # Lấy cái chìa khóa bạn vừa cấu hình ở Bước 2
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Đẩy toàn bộ code và data mới nhất sang Space VietcapSmartScreener của bạn
          git push --force https://preut:$HF_TOKEN@huggingface.co/spaces/preut/VietcapSmartScreener main